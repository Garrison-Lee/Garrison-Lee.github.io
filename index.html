<html>
<head>
	<link rel="stylesheet" href="phone.css">
	<title>A Worse Phone Interface</title>
</head>
<body>
	<div class="top_bar" id="tab_bar">
		<button class="tab_button" id="tab_dial">Dial</button>

		<button class="tab_button" id="tab_contacts">Contact List</button>

		<button class="tab_button" id="tab_addcontact">Add Contact</button>
	</div>

	<div class="content" id="content">

		<div class="content_section" id="content_dial">
			<h1>Dialer</h1>

			<input id="dialer_input"/>

			<button class="dialer_button" id="1">1</button>
			<button class="dialer_button" id="2">2</button>
			<button class="dialer_button" id="3">3</button>
			<button class="dialer_button" id="4">4</button>
			<button class="dialer_button" id="5">5</button>
			<button class="dialer_button" id="6">6</button>
			<button class="dialer_button" id="7">7</button>
			<button class="dialer_button" id="8">8</button>
			<button class="dialer_button" id="9">9</button>
			<button class="dialer_button" id="*">*</button>
			<button class="dialer_button" id="0">0</button>
			<button class="dialer_button" id="#">#</button>
			<button class="dial_clear"    id="dial">Dial</button>
			<button class="dial_clear"    id="clear">Clear</button>

		</div>

		<div class="content_section" id="content_contacts">
			<h1 id="contacts_header">Contact List</h1>
			<button class="contact_button" id="Poppy">Poppy</button>
			<button class="contact_button" id="Sage Madden">Sage Madden</button>
			<button class="contact_button" id="Timbo Thaler">Timbo Thaler</button>
		</div>

		<div class="content_section" id="content_addcontact">
			<h1>Add Contact</h1>
			<form id="add_contact_form">
				<label for="name">Name</label>
				<input id="name" placeholder="Jane Doe"/>
				<label for="number">Phone Number</label>
				<input id="number" placeholder="420-666-6969"/>
				<label for="email">Email</label>
				<input id="email" placeholder="myemail@gmail.com"/>
			</form>
			<button id="add_contact">Add Contact</button>
			<button id="clear_contact_form">Clear</button>
		</div>

	</div>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
	<script src="phone.js"></script>
</body>
</html>
